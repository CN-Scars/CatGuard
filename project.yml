name: CatGuard
options:
  bundleIdPrefix: com.catguard
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    # 使用本地自签名证书(CatGuard Local Dev),保证 rebuild 后代码签名哈希稳定,
    # TCC 辅助功能授权才能跨编译保留,无需每次重新授权。v0.3 正式发布时再换 Developer ID。
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "CatGuard Local Dev"

targets:
  CatGuard:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: CatGuard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.catguard.app
        PRODUCT_NAME: CatGuard
        INFOPLIST_FILE: CatGuard/Info.plist
        CODE_SIGN_ENTITLEMENTS: CatGuard/CatGuard.entitlements
        ENABLE_HARDENED_RUNTIME: true
        ENABLE_APP_SANDBOX: false
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
        # 关闭 Xcode 16 的 Debug Dylib 拆分:它生成的 CatGuard.debug.dylib 与主程序
        # 用本地自签名身份签名时 Team ID 不一致,dyld 会拒绝加载导致启动崩溃。
        ENABLE_DEBUG_DYLIB: false
    dependencies:
      - sdk: IOKit.framework
      - sdk: LocalAuthentication.framework

  CatGuardTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    # 独立逻辑测试：不设 TEST_HOST，不注入主 App，避免自签名 + 硬化运行时
    # 导致的测试 bundle 加载失败（different Team IDs）。
    # 直接把被测的纯逻辑源文件编进测试 target，无需 @testable import 主 App。
    sources:
      - path: CatGuardTests
      - path: CatGuard/HitTestGeometry.swift
      - path: CatGuard/LockStateManager.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.catguard.tests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "CatGuard Local Dev"

schemes:
  CatGuard:
    build:
      targets:
        CatGuard: all
        CatGuardTests: [test]
    test:
      targets:
        - CatGuardTests
